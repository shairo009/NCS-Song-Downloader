name: Test NCS Downloader

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install yt-dlp
      run: pip install yt-dlp
    
    - name: Run tests
      run: python tests/run_tests.py